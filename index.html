<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Points Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: auto;
  padding: 20px;
}
.card {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
}
input, button {
  padding: 10px;
  margin: 5px 0;
}
</style>
</head>
<body>

<h1>Points Tracker</h1>

<div class="card">
  <h2>Today's Points</h2>
  <p>Weekly Flex Remaining:
<strong id="flex">42</strong></p>
  <p>Budget: <strong>26</strong></p>
  <p>Used: <span id="used">0</span></p>
  <p>Remaining: <span id="remaining">26</span></p>
</div>

<div class="card">
  <h2>Add Food</h2>
  <input type="text" id="foodName" placeholder="Food Name"><br>
  <input type="number" id="foodPoints" placeholder="Points"><br>
  <button onclick="addFood()">Add Food</button>
</div>

<div class="card">
  <h2>Weight Log</h2>
  <input type="number" id="weight" placeholder="Current Weight"><br>
  <button onclick="saveWeight()">Save Weight</button>
</div>

<div class="card">
  <h2>Food History</h2>
  <ul id="foodHistory"></ul>
</div>

<div class="card">
  <h2>Weight History</h2>
  <ul id="weightHistory"></ul>
</div>

<script src="app.js"></script>

</body>
</html>
